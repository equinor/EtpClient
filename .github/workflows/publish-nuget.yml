# NuGet publish workflow for EtpClient — manual / emergency use only
#
# Automated publishing is handled by release-please.yml: when a Release PR
# is merged, release-please tags the commit and publish-nuget runs as part
# of the same workflow.
#
# This workflow exists for out-of-band publishes, e.g. re-publishing a
# specific version or pushing a pre-release without going through a Release PR.
# Supply a version explicitly; if omitted the version is read from
# <VersionPrefix> in Directory.Build.props.
#
# Authentication uses the built-in GITHUB_TOKEN — no PAT required.

name: Publish NuGet

on:
  # Manual trigger only — automated publishing is done via release-please.yml
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to read from Directory.Build.props)'
        required: false
        type: string

# Read repository contents, write to GitHub Packages
permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Pack the EtpClient library and push it to the GitHub Package Repository.
  # ---------------------------------------------------------------------------
  publish:
    name: Pack and publish EtpClient
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # .NET SDK version — update this single line when upgrading to a new major/minor
      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Resolve the version to publish:
      # - If a version was supplied via workflow_dispatch input, use it.
      # - Otherwise, extract the semver value from the VersionPrefix line in
      #   Directory.Build.props (strips the x-release-please-version marker).
      - name: Resolve package version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep -oP '\d+\.\d+\.\d+' Directory.Build.props | head -1)
            echo "value=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Restore NuGet packages
        run: dotnet restore src/EtpClient/EtpClient.csproj

      - name: Build library (Release)
        run: dotnet build src/EtpClient/EtpClient.csproj --configuration Release --no-restore

      - name: Pack library (version ${{ steps.version.outputs.value }})
        run: dotnet pack src/EtpClient/EtpClient.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Push package to GitHub Package Repository
        run: |
          dotnet nuget push "src/EtpClient/bin/Release/*.nupkg" \
            --source "https://nuget.pkg.github.com/equinor/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate
